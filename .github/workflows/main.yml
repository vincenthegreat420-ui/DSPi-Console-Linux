name: Build Linux Library

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cbindgen
      run: |
        cargo install cbindgen --version 0.26.0

    # Находим папку с Cargo.toml динамически и запускаем сборку
    - name: Build Core Library
      run: |
        MANIFEST_PATH=$(find . -name "Cargo.toml" -not -path "*/target/*" | head -n 1)
        if [ -z "$MANIFEST_PATH" ]; then
          echo "Error: Cargo.toml not found in the repository!"
          exit 1
        fi
        PROJECT_DIR=$(dirname "$MANIFEST_PATH")
        echo "Found Rust project in: $PROJECT_DIR"
        echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
        
        cd "$PROJECT_DIR"
        cargo build --release

    # Генерируем заголовочный файл Си в найденной папке
    - name: Generate C Header
      run: |
        cd "${{ env.PROJECT_DIR }}"
        mkdir -p include
        if [ -f "core/cbindgen.toml" ]; then
          cbindgen --config core/cbindgen.toml --crate dspi-core --output include/dspi_core.h
        else
          cbindgen --crate dspi-core --output include/dspi_core.h
        fi

    # Собираем артефакты, используя динамический путь
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dspi-core-linux-x86_64
        path: |
          ${{ env.PROJECT_DIR }}/target/release/libdspi_core.so
          ${{ env.PROJECT_DIR }}/target/release/libdspi_core.a
          ${{ env.PROJECT_DIR }}/include/dspi_core.h
