name: Build DSPi Core

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Core
        run: |
          cargo build --release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dspi-core-linux
          path: |
            target/release/libdspi_core.so
            target/release/libdspi_core.a
