name: Build Linux Library and GUI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет запускать сборку вручную через сайт GitHub

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Устанавливаем системные зависимости для работы с USB, udev и сборки Qt5 приложений
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libusb-1.0-0-dev \
          libudev-dev \
          build-essential \
          cmake \
          qtbase5-dev \
          qtdeclarative5-dev \
          qtquickcontrols2-5-dev \
          libgl1-mesa-dev

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cbindgen
      run: |
        cargo install cbindgen --version 0.26.0

    # 2. Ищем папку с Rust бэкендом и компилируем core-библиотеку
    - name: Build Core Library
      run: |
        MANIFEST_PATH=$(find . -name "Cargo.toml" -not -path "*/target/*" | head -n 1)
        if [ -z "$MANIFEST_PATH" ]; then
          echo "Error: Cargo.toml not found in the repository!"
          exit 1
        fi
        PROJECT_DIR=$(dirname "$MANIFEST_PATH")
        echo "Found Rust project in: $PROJECT_DIR"
        echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
        
        cd "$PROJECT_DIR"
        cargo build --release

    # 3. Генерируем заголовочный файл Си (dspi_core.h) в структуре проекта
    - name: Generate C Header
      run: |
        cd "${{ env.PROJECT_DIR }}"
        mkdir -p include
        if [ -f "core/cbindgen.toml" ]; then
          cbindgen --config core/cbindgen.toml --crate dspi-core --output include/dspi_core.h
        else
          cbindgen --crate dspi-core --output include/dspi_core.h
        fi

    # 4. Находим папку qt, связываем её с собранной библиотекой и компилируем GUI
    - name: Build Qt GUI App
      run: |
        QT_DIR=$(find . -maxdepth 3 -type d -name "qt" | head -n 1)
        if [ -z "$QT_DIR" ]; then
          echo "Error: 'qt' directory not found in the repository!"
          exit 1
        fi
        echo "Found Qt project in: $QT_DIR"
        echo "QT_DIR=$QT_DIR" >> $GITHUB_ENV
        
        cd "$QT_DIR"
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j$(nproc)

    # 5. Выгружаем в артефакты и бэкенд, и готовый исполняемый файл интерфейса
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dspi-complete-linux-x86_64
        path: |
          ${{ env.PROJECT_DIR }}/target/release/libdspi_core.so
          ${{ env.PROJECT_DIR }}/include/dspi_core.h
          ${{ env.QT_DIR }}/build/DSPiConsole
          ${{ env.QT_DIR }}/build/dspi-gui
